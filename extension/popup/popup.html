<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save to Voyager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Save to Voyager</h1>
      <span id="version" class="version"></span>
    </header>

    <div id="status" class="status"></div>

    <div id="preview">
      <p id="page-title" class="preview-title">Loading…</p>
      <p id="page-url" class="preview-url"></p>
      <div class="preview-meta">
        <span id="page-source" class="badge"></span>
        <span id="word-count" class="meta-text"></span>
      </div>
    </div>

    <button id="save-btn" class="btn-primary" disabled>Save to Voyager</button>
    <p class="shortcut-hint">Alt+Shift+S to quick-save</p>

    <div id="enrichment-result" class="enrichment hidden"></div>

    <details id="history-panel">
      <summary>Recent saves <span id="history-count" class="count-badge">0</span></summary>
      <div id="history-list" class="history-body">
        <p class="empty-state">No saves yet.</p>
      </div>
    </details>

    <details id="settings-panel">
      <summary>Settings</summary>
      <div class="settings-body">
        <label for="claude-key">Claude API Key</label>
        <input type="password" id="claude-key" placeholder="sk-ant-...">

        <label for="notion-token">Notion Integration Token</label>
        <input type="password" id="notion-token" placeholder="ntn_...">

        <label for="notion-db-id">Notion Database ID</label>
        <input type="text" id="notion-db-id" placeholder="81eb2b5a-05f6-433e-8c89-0d7c78cb798e">

        <label for="slack-webhook">Slack Webhook URL <span class="optional">(optional)</span></label>
        <input type="url" id="slack-webhook" placeholder="https://hooks.slack.com/...">

        <button id="save-settings" class="btn-secondary">Save Settings</button>
      </div>
    </details>
  </div>

  <script src="popup.js"></script>
</body>
</html>
