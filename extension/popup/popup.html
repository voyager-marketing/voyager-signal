<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save to Voyager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Save to Voyager</h1>
    </header>

    <div id="status" class="status"></div>

    <div id="preview">
      <p id="page-title" class="preview-title">Loading…</p>
      <p id="page-url" class="preview-url"></p>
      <p id="page-source" class="preview-source"></p>
    </div>

    <button id="save-btn" class="btn-primary" disabled>Save to Voyager</button>

    <details id="settings-panel">
      <summary>Settings</summary>
      <div class="settings-body">
        <label for="webhook-url">n8n Webhook URL</label>
        <input type="url" id="webhook-url" placeholder="https://your-n8n.app/webhook/...">

        <label for="notion-token">Notion Token</label>
        <input type="password" id="notion-token" placeholder="ntn_...">

        <label for="claude-key">Claude API Key</label>
        <input type="password" id="claude-key" placeholder="sk-ant-...">

        <button id="save-settings" class="btn-secondary">Save Settings</button>
      </div>
    </details>
  </div>

  <script src="popup.js"></script>
</body>
</html>
